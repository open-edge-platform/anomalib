listening-port=3478
# If your TURN host has a public IP, put it here; otherwise omit for LAN testing.
# external-ip=PUBLIC_IP

# Auth (static user for dev)
lt-cred-mech
user=webrtc:webrtcpass
realm=webrtc.local

# Useful defaults
fingerprint
verbose

# Optional: enable TCP too (often helps on restrictive networks)
# listening-port=3478 already covers UDP; add:
listening-port=3478
tls-listening-port=5349
