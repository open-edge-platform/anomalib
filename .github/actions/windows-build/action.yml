name: Build Windows MSIX
description: >
  Build Windows MSIX packages for the specified accelerator
inputs:
  rc_version:
    description: "Release candidate version used in MSIX filename"
    required: false
    type: string
    default: ""
  accelerator:
    description: "Backend accelerator to build (matrix: cpu, cu124, xpu)"
    required: true
    type: string
  debug_build:
    description: "Produce debug build (unoptimized, with symbols)"
    type: boolean
    required: false
    default: false
  MSIX_SIGN_CERTIFICATE:
    description: "Base64-encoded Windows signing certificate used for MSIX signing"
    required: true
    type: string
  MSIX_SIGN_CERTIFICATE_PASSWORD:
    description: "Password for the Windows signing certificate"
    required: true
    type: string

runs:
  using: "composite"
  steps:
    - name: Define paths

      env:
        ACCELERATOR: ${{ inputs.accelerator }}
        DEBUG_BUILD: ${{ inputs.debug_build || false }}
        RC_VERSION: ${{ inputs.rc_version || '' }}
        TAURI_PATH: application/binary/tauri
        TAURI_SRC_PATH: application/binary/tauri/src-tauri
        SIDECAR_PATH: application/binary/sidecar
        BACKEND_PATH: application/backend
      run: |
        $runNum = if ($env:GITHUB_RUN_NUMBER) { $env:GITHUB_RUN_NUMBER } else { "0" }
        $targetDir = if ($env:DEBUG_BUILD -eq "true") { "debug" } else { "release" }
        $uiBuildPath = "$env:TAURI_SRC_PATH\target\$targetDir"
        $msixBundlePath = "$uiBuildPath\bundle\msix"
        $suffix = if ($env:DEBUG_BUILD -eq "true") { "-debug" } else { "" }
        $msixFilePrefix = "anomalib-studio-$($env:ACCELERATOR)"

        if ($env:RC_VERSION) {
          $msixFileName = "$msixFilePrefix-$($env:RC_VERSION)$suffix.msix"
        } else {
          $msixFileName = "$msixFilePrefix-build-$runNum$suffix.msix"
        }

        $msixFilePath = "$msixBundlePath\$msixFileName"

        $sdkBin = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
        $sdkVersion = Get-ChildItem $sdkBin -Directory | Where-Object { $_.Name -match '^10\.' } | Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty Name
        $sdkRoot = "$sdkBin\$sdkVersion\x64"
        $makeappx = "$sdkRoot\makeappx.exe"
        $signtool = "$sdkRoot\signtool.exe"

        "UI_BUILD_PATH=$($uiBuildPath)" | Out-File -FilePath $env:GITHUB_ENV -Append
        "MSIX_BUNDLE_PATH=$msixBundlePath" | Out-File -FilePath $env:GITHUB_ENV -Append
        "MSIX_FILE_NAME=$msixFileName" | Out-File -FilePath $env:GITHUB_ENV -Append
        "MSIX_FILE_PATH=$msixFilePath" | Out-File -FilePath $env:GITHUB_ENV -Append
        "MAKEAPPX_PATH=$makeappx" | Out-File -FilePath $env:GITHUB_ENV -Append
        "SIGNTOOL_PATH=$signtool" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    # Cache poisoning mitigation: fork PRs blocked, same-repo PRs allowed
    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0 # zizmor: ignore[cache-poisoning]
      with:
        version: "latest"
        enable-cache: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        toolchain: stable

    # Cache poisoning mitigation: fork PRs blocked, same-repo PRs allowed with event+branch isolation
    - name: Cache Rust dependencies
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4 # zizmor: ignore[cache-poisoning]
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          application/binary/tauri/src-tauri/target/
        key: ${{ runner.os }}-cargo-${{ github.event_name }}-${{ github.ref_name }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ github.event_name }}-${{ github.ref_name }}-

    # Cache poisoning mitigation: fork PRs blocked, same-repo PRs allowed
    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0 # zizmor: ignore[cache-poisoning]
      with:
        node-version: "24"
        cache: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'npm' || '' }}
        cache-dependency-path: application/binary/tauri/package-lock.json

    - name: Enable long paths
      shell: powershell
      run: |
        $registryPath = "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem"
        $currentValue = (Get-ItemProperty -Path $registryPath -Name LongPathsEnabled -ErrorAction SilentlyContinue).LongPathsEnabled
        if ($currentValue -ne 1) {
          Set-ItemProperty -Path $registryPath -Name LongPathsEnabled -Type DWord -Value 1
        }

    - name: Configure Git long paths
      run: git config --system core.longpaths true

    - name: Build Python sidecar (Windows ${{ inputs.accelerator }})
      working-directory: application/backend
      run: |
        uv sync --no-dev --extra ${{ inputs.accelerator }}
        .\.venv\Scripts\Activate.ps1
        Push-Location ..\binary\sidecar
        uv run --active pyinstaller --clean --noconfirm anomalib_studio.spec
        Pop-Location

    - name: Install Tauri dependencies
      working-directory: application/binary/tauri
      run: npm ci

    - name: Build Tauri app
      working-directory: application/binary/tauri
      env:
        DEBUG_BUILD: ${{ inputs.debug_build }}
      # _internal is not in tauri.conf.json resources by default because
      # Tauri's build script scans every resource file for rerun-if-changed,
      # and _internal has thousands of Python runtime files that cause slow
      # rebuilds and "file in use" errors on Windows during dev. We inject
      # the resource mapping only for production builds via --config.
      # See application/binary/README.md for local build commands.
      run: |
        $opts = @("-v", "--config", '{"bundle":{"resources":{"sidecar/_internal/":"_internal/"}}}')
        if ($env:DEBUG_BUILD -eq "true") { $opts += "--debug" }
        & npx tauri build $opts

    - name: Create MSIX package
      run: |
        if (Test-Path $env:MSIX_BUNDLE_PATH) {
          Remove-Item $env:MSIX_BUNDLE_PATH -Recurse -Force
        }
        New-Item -ItemType Directory -Force -Path $env:MSIX_BUNDLE_PATH | Out-Null
        Copy-Item "$env:UI_BUILD_PATH\anomalib-studio.exe" -Destination $env:MSIX_BUNDLE_PATH
        $backendExe = Get-ChildItem "$env:UI_BUILD_PATH" -Filter "anomalib-studio-backend*.exe" | Select-Object -First 1
        if (-not $backendExe) {
          Write-Error "Backend executable matching 'anomalib-studio-backend*.exe' was not found in '$($env:UI_BUILD_PATH)'."
          exit 1
        }
        if (-not (Test-Path $backendExe.FullName)) {
          Write-Error "Resolved backend executable path '$($backendExe.FullName)' does not exist."
          exit 1
        }
        Copy-Item $backendExe.FullName -Destination $env:MSIX_BUNDLE_PATH
        Copy-Item $backendExe.FullName -Destination "$($env:MSIX_BUNDLE_PATH)\anomalib-studio-backend.exe"
        if (Test-Path "$env:UI_BUILD_PATH\_internal") {
          Copy-Item "$env:UI_BUILD_PATH\_internal" -Destination $env:MSIX_BUNDLE_PATH -Recurse
        }
        else {
          Write-Error "Expected directory '$env:UI_BUILD_PATH\_internal' not found. The Python runtime _internal payload is missing from the UI build output."
          exit 1
        }
        Copy-Item "$env:TAURI_SRC_PATH\msix\*" -Destination $env:MSIX_BUNDLE_PATH -Recurse -Force
        New-Item -ItemType Directory -Force -Path "$env:MSIX_BUNDLE_PATH\Assets" | Out-Null
        Copy-Item "$env:TAURI_SRC_PATH\icons\icon.png" -Destination "$($env:MSIX_BUNDLE_PATH)\Assets\logo.png"
        & "$env:MAKEAPPX_PATH" pack /d $env:MSIX_BUNDLE_PATH /p $env:MSIX_FILE_PATH

    - name: Sign MSIX package
      env:
        MSIX_SIGN_CERTIFICATE: ${{ inputs.MSIX_SIGN_CERTIFICATE }}
        MSIX_SIGN_CERTIFICATE_PASSWORD: ${{ inputs.MSIX_SIGN_CERTIFICATE_PASSWORD }}
      run: |
        $bytes = [System.Convert]::FromBase64String($env:MSIX_SIGN_CERTIFICATE)
        $securePassword = ConvertTo-SecureString $env:MSIX_SIGN_CERTIFICATE_PASSWORD -AsPlainText -Force
        $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new()
        $cert.Import(
          $bytes,
          $securePassword,
          [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::PersistKeySet -bor
          [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::UserKeySet
        )
        $store = [System.Security.Cryptography.X509Certificates.X509Store]::new("My", "CurrentUser")
        $store.Open([System.Security.Cryptography.X509Certificates.OpenFlags]::ReadWrite)
        $store.Add($cert)
        try {
          & $env:SIGNTOOL_PATH sign /fd SHA256 /sha1 $cert.Thumbprint /s My $env:MSIX_FILE_PATH
        }
        finally {
          $store.Remove($cert)
          $store.Close()
          $cert.Reset()
        }

    - name: Upload MSIX artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: anomalib-studio-windows-msix-${{ inputs.accelerator }}
        path: ${{ env.MSIX_FILE_PATH }}
        retention-days: 30
        if-no-files-found: error
