name: "Documentation Sync (OpenCode)"

on:
  schedule:
    - cron: "30 9 * * 1-5" # Weekdays at 9:30 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: "opencode-docs-sync"
  cancel-in-progress: true

jobs:
  docs-sync:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for git log

      - name: Skip if open docs-sync PR exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_PRS=$(gh pr list --label "docs-sync" --state open --json number --jq 'length')
          if [ "$OPEN_PRS" -gt 0 ]; then
            echo "::notice::Open docs-sync PR already exists. Skipping."
            exit 0
          fi

      - name: Verify ollama is running
        run: |
          if ! curl -sf http://localhost:11434/api/tags > /dev/null; then
            echo "::error::Ollama is not running on this runner"
            exit 1
          fi
          for MODEL in gemma4:31b qwen3-coder:30b; do
            if ! curl -sf http://localhost:11434/api/tags | grep -q "$MODEL"; then
              echo "::warning::$MODEL not found, pulling..."
              ollama pull "$MODEL"
            fi
          done

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run docs-sync agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OPENCODE_PERMISSION: '{"read":"allow","glob":"allow","grep":"allow","edit":{"*":"deny","*.md":"allow","*.rst":"allow","*.mdx":"allow","docs/**":"allow","src/anomalib/models/**/README.md":"allow","README.md":"allow"},"bash":{"*":"deny","git *":"allow","gh pr *":"allow","gh api *":"allow","gh search *":"allow","date *":"allow","ls *":"allow","find *":"allow","cat *":"allow"}}'
          OPENCODE_CONFIG: .github/opencode.json
        run: |
          opencode run --pure -m ollama/gemma4:31b --agent docs-sync \
            "Run the documentation sync process. Check for documentation drift from code changes in the last 7 days and open a PR if needed."
