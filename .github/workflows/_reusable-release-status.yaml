# Release Status Workflow
#
# This reusable workflow validates and reports the status of production releases.
#
# Key Features:
# - Status verification
# - Error detection
# - Status reporting
# - Process validation
#
# Process Stages:
# 1. Status Collection:
#    - Production status check
#    - Process completion verification
#
# 2. Validation:
#    - Error detection
#    - Status analysis
#    - Outcome determination
#
# 3. Reporting:
#    - Status summary
#    - Error reporting
#    - Success confirmation
#
# Required Inputs:
# - version: Release version
# - prod-status: Production process status
#
# Example Usage:
# 1. Status Check:
#    jobs:
#      status:
#        uses: ./.github/workflows/_reusable-release-status.yaml
#        with:
#          version: "v1.2.3"
#          prod-status: "success"
#
# Note: Should be used as final step in release workflows

name: Release Status Check

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      prod-status:
        required: true
        type: string

permissions:
  contents: read

jobs:
  check-status:
    runs-on: ubuntu-latest
    steps:
      - name: Verify workflow status
        env:
          INPUTS_VERSION: ${{ inputs.version }}
          INPUTS_PROD_STATUS: ${{ inputs.prod-status }}
        run: |
          if [[ "$INPUTS_PROD_STATUS" != "success" ]]; then
            echo "::error::Release workflow failed with status: $INPUTS_PROD_STATUS"
            exit 1
          fi

          echo "Production release $INPUTS_VERSION completed successfully"
