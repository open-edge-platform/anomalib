name: "Issue Triage (OpenCode)"

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  group: "opencode-issue-triage-${{ github.event.issue.number }}"

jobs:
  triage:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github
            .agents
          sparse-checkout-cone-mode: true
          fetch-depth: 1

      - name: Verify ollama is running
        run: |
          if ! curl -sf http://localhost:11434/api/tags > /dev/null; then
            echo "::error::Ollama is not running on this runner"
            exit 1
          fi
          for MODEL in gemma4:31b qwen3-coder:30b; do
            if ! curl -sf http://localhost:11434/api/tags | grep -q "$MODEL"; then
              echo "::warning::$MODEL not found, pulling..."
              ollama pull "$MODEL"
            fi
          done

      - name: Triage issue with OpenCode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          OPENCODE_PERMISSION: '{"read":"allow","glob":"allow","grep":"allow","bash":{"*":"deny","gh issue *":"allow","gh search *":"allow","gh label *":"allow","gh api *":"allow","cat *":"allow","find *":"allow","grep *":"allow","head *":"allow"},"edit":"deny"}'
          OPENCODE_CONFIG: .github/opencode.json
        run: |
          opencode run --pure -m ollama/gemma4:31b --agent issue-triage \
            "Triage issue #${ISSUE_NUMBER} in repository ${GITHUB_REPOSITORY}. The issue number is in the ISSUE_NUMBER environment variable."
