name: Download URL Health Check

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6 AM UTC
  workflow_dispatch: # Allow manual runs

permissions:
  contents: read

jobs:
  check-urls:
    name: Verify download URLs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.3.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -e ".[cpu,test]"

      - name: Run download URL tests
        run: |
          PYTHONPATH=src pytest tests/integration/data/test_download_urls.py -m network -v --timeout=300
