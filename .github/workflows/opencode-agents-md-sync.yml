name: "AGENTS.md Sync (OpenCode)"

on:
  schedule:
    - cron: "0 8 * * 1" # Weekly on Monday at 8:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: "opencode-agents-md-sync"
  cancel-in-progress: true

jobs:
  agents-md-sync:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if open agents-md-sync PR exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_PRS=$(gh pr list --label "agents-md-sync" --state open --json number --jq 'length')
          if [ "$OPEN_PRS" -gt 0 ]; then
            echo "::notice::Open agents-md-sync PR already exists. Skipping."
            exit 0
          fi

      - name: Verify ollama is running
        run: |
          if ! curl -sf http://localhost:11434/api/tags > /dev/null; then
            echo "::error::Ollama is not running on this runner"
            exit 1
          fi
          for MODEL in gemma4:31b qwen3-coder:30b; do
            if ! curl -sf http://localhost:11434/api/tags | grep -q "$MODEL"; then
              echo "::warning::$MODEL not found, pulling..."
              ollama pull "$MODEL"
            fi
          done

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run agents-md-sync agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OPENCODE_PERMISSION: '{"read":"allow","glob":"allow","grep":"allow","edit":{"*":"deny","AGENTS.md":"allow",".github/agents-md-sync-state":"allow"},"bash":{"*":"deny","git *":"allow","gh pr *":"allow","gh api *":"allow","gh search *":"allow","ls *":"allow","cat *":"allow","date *":"allow"}}'
          OPENCODE_CONFIG: .github/opencode.json
        run: |
          opencode run -m ollama/gemma4:31b --agent agents-md-sync \
            "Run the AGENTS.md maintenance process. Check for structural codebase changes and update AGENTS.md if needed."
