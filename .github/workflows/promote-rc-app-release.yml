name: Promote Application RC Images

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "RC tag version (example: app/v0.1.0rc1)"
        required: true
        type: string
      sha:
        description: "Expected 40-char commit SHA for the RC tag"
        required: true
        type: string
      dry_run:
        description: 'Dry run mode (validate only, make no changes)'
        required: false
        type: boolean
        default: false
      force:
        description: 'Force promotion even if stable tags already exist with a different digest'
        required: false
        type: boolean
        default: false

permissions: {} # No permissions by default

jobs:
  validate:
    name: Validate inputs and RC tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      rc_tag: ${{ steps.validate.outputs.rc_tag }}
      rc_sha: ${{ steps.validate.outputs.rc_sha }}
      release_tag: ${{ steps.validate.outputs.release_tag }}
      docker_rc_tag: ${{ steps.validate.outputs.docker_rc_tag }}
      docker_patch_tag: ${{ steps.validate.outputs.docker_patch_tag }}
      docker_minor_tag: ${{ steps.validate.outputs.docker_minor_tag }}
      docker_major_tag: ${{ steps.validate.outputs.docker_major_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate and normalize inputs
        id: validate
        env:
          RC_TAG_INPUT: ${{ inputs.rc_tag }}
          EXPECTED_SHA: ${{ inputs.sha }}
        run: |
          if [[ "${RC_TAG_INPUT}" != app/v* ]]; then
            echo "Error: rc_tag must start with 'app/v'"
            echo "Received: ${RC_TAG_INPUT}"
            exit 1
          fi
          RC_TAG="${RC_TAG_INPUT}"
          if [[ ! "${RC_TAG}" =~ ^app/v[0-9]+\.[0-9]+\.[0-9]+rc[0-9]+$ ]]; then
            echo "Error: rc_tag must match 'app/v<major>.<minor>.<patch>rc<N>'"
            echo "Received: ${RC_TAG_INPUT}"
            exit 1
          fi

          if [[ ! "${EXPECTED_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "Error: sha must be exactly 40 hex characters"
            echo "Received: ${EXPECTED_SHA}"
            exit 1
          fi

          # Derive release tag by stripping rc[N] suffix
          RELEASE_TAG="$(echo "${RC_TAG}" | sed -E 's/rc[0-9]+$//')"
          if [[ "${RELEASE_TAG}" == "${RC_TAG}" ]]; then
            echo "Error: could not validate release tag from rc tag '${RC_TAG}'"
            exit 1
          fi
          VERSION="${RELEASE_TAG#app/v}"
          MAJOR="${VERSION%%.*}"
          MINOR_PATCH="${VERSION#*.}"
          MINOR="${MINOR_PATCH%%.*}"

          # Docker image tags (no app/v prefix)
          DOCKER_RC_TAG="${RC_TAG#app/v}"
          DOCKER_PATCH_TAG="${VERSION}"
          DOCKER_MINOR_TAG="${MAJOR}.${MINOR}"
          DOCKER_MAJOR_TAG="${MAJOR}"

          echo "RC tag:           ${RC_TAG}"
          echo "Release tag:      ${RELEASE_TAG}"
          echo "Docker RC tag:    ${DOCKER_RC_TAG}"
          echo "Docker tags:      ${DOCKER_PATCH_TAG}, ${DOCKER_MINOR_TAG}, ${DOCKER_MAJOR_TAG}"

          # Verify RC tag exists in git
          if ! git rev-parse "refs/tags/${RC_TAG}" >/dev/null 2>&1; then
            echo "::error::RC tag ${RC_TAG} does not exist in git"
            exit 1
          fi
          RC_SHA=$(git rev-parse "refs/tags/${RC_TAG}^{commit}")
          echo "RC SHA:           ${RC_SHA}"

          # Verify RC SHA matches expected SHA input
          if [[ "${RC_SHA}" != "${EXPECTED_SHA}" ]]; then
            echo "::error::RC tag ${RC_TAG} points to ${RC_SHA} but expected ${EXPECTED_SHA}"
            exit 1
          fi
          # If release tag already exists, verify it points to the same commit (idempotent re-run)
          if git rev-parse "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            EXISTING_SHA=$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")
            if [[ "${EXISTING_SHA}" != "${RC_SHA}" ]]; then
              echo "::error::Release tag ${RELEASE_TAG} already exists at ${EXISTING_SHA}, but RC points to ${RC_SHA}. Aborting to prevent overwrite."
              exit 1
            fi
            echo "::notice::Release tag ${RELEASE_TAG} already exists at the correct commit (idempotent re-run)"
          fi

          echo "rc_tag=${RC_TAG}" >> "$GITHUB_OUTPUT"
          echo "rc_sha=${RC_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "docker_rc_tag=${DOCKER_RC_TAG}" >> "$GITHUB_OUTPUT"
          echo "docker_patch_tag=${DOCKER_PATCH_TAG}" >> "$GITHUB_OUTPUT"
          echo "docker_minor_tag=${DOCKER_MINOR_TAG}" >> "$GITHUB_OUTPUT"
          echo "docker_major_tag=${DOCKER_MAJOR_TAG}" >> "$GITHUB_OUTPUT"

      - name: Print promotion summary
        env:
          RC_TAG: ${{ steps.validate.outputs.rc_tag }}
          RELEASE_TAG: ${{ steps.validate.outputs.release_tag }}
          RC_SHA: ${{ steps.validate.outputs.rc_sha }}
          DOCKER_RC_TAG: ${{ steps.validate.outputs.docker_rc_tag }}
          DOCKER_PATCH_TAG: ${{ steps.validate.outputs.docker_patch_tag }}
          DOCKER_MINOR_TAG: ${{ steps.validate.outputs.docker_minor_tag }}
          DOCKER_MAJOR_TAG: ${{ steps.validate.outputs.docker_major_tag }}
          DRY_RUN: ${{ inputs.dry_run }}
          FORCE: ${{ inputs.force }}
        run: |
          {
            echo "## Promotion Summary"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| RC tag | \`${RC_TAG}\` |"
            echo "| Release tag | \`${RELEASE_TAG}\` |"
            echo "| Commit SHA | \`${RC_SHA}\` |"
            echo "| Docker RC tag | \`${DOCKER_RC_TAG}\` |"
            echo "| Docker stable tags | \`${DOCKER_PATCH_TAG}\`, \`${DOCKER_MINOR_TAG}\`, \`${DOCKER_MAJOR_TAG}\` |"
            echo "| Dry run | \`${DRY_RUN}\` |"
            echo "| Force | \`${FORCE}\` |"
            echo ""
            if [[ "${DRY_RUN}" == "true" ]]; then
              echo "> **Dry run mode:** No changes will be made."
            fi
            if [[ "${FORCE}" == "true" ]]; then
              echo "> **Force mode:** Existing stable tags with a different digest will be overwritten."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  create-release-tag:
    needs: validate
    if: inputs.dry_run == false
    name: Create release git tag
    runs-on: ubuntu-latest
    environment: "production"
    permissions:
      contents: write # Permission to push release tag to git
    steps:
      - name: Create release git tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
          RC_SHA: ${{ needs.validate.outputs.rc_sha }}
        run: |
          set -euo pipefail
          if gh api "repos/${{ github.repository }}/git/ref/tags/${RELEASE_TAG}" --silent >/dev/null 2>&1; then
            EXISTING_SHA=$(gh api "repos/${{ github.repository }}/git/ref/tags/${RELEASE_TAG}" --jq '.object.sha')
            if [[ "${EXISTING_SHA}" == "${RC_SHA}" ]]; then
              echo "Tag ${RELEASE_TAG} already exists at ${RC_SHA}, skipping creation"
            else
              echo "::error::Tag ${RELEASE_TAG} already exists at ${EXISTING_SHA} but expected ${RC_SHA}"
              exit 1
            fi
          else
            echo "Creating tag ${RELEASE_TAG} pointing to ${RC_SHA}"
            gh api "repos/${{ github.repository }}/git/refs" \
              -f "ref=refs/tags/${RELEASE_TAG}" \
              -f "sha=${RC_SHA}"
            echo "Tag ${RELEASE_TAG} created successfully"
          fi

  promote-docker:
    needs: [validate, create-release-tag]
    if: inputs.dry_run == false
    name: Promote RC image to release image
    runs-on: ubuntu-latest
    permissions:
      packages: write # Permission to push packages to GHCR
      id-token: write # Permission to request OIDC token for signing images
    timeout-minutes: 30
    strategy:
      matrix:
        device: [cpu, xpu, cuda]
    env:
      RC_TAG: ${{ inputs.rc_tag }}
      DEVICE: ${{ matrix.device }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Re-tag Docker image for ${{ matrix.device }}
        env:
          DOCKER_RC_TAG: ${{ needs.validate.outputs.docker_rc_tag }}
          DOCKER_PATCH_TAG: ${{ needs.validate.outputs.docker_patch_tag }}
          DOCKER_MINOR_TAG: ${{ needs.validate.outputs.docker_minor_tag }}
          DOCKER_MAJOR_TAG: ${{ needs.validate.outputs.docker_major_tag }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail
          for IMAGE in ghcr.io/open-edge-platform/anomalib-studio-${DEVICE}; do
            RC_DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${DOCKER_RC_TAG}" --format '{{.Manifest.Digest}}')
            if [[ -z "${RC_DIGEST}" ]]; then
              echo "::error::Could not retrieve digest for RC image ${IMAGE}:${DOCKER_RC_TAG}. Ensure the image exists and is accessible."
              exit 1
            fi
            echo "${IMAGE}:${DOCKER_RC_TAG} digest: ${RC_DIGEST}"
            FORCE_OVERRIDE_USED=false
            for TAG in "${DOCKER_PATCH_TAG}" "${DOCKER_MINOR_TAG}" "${DOCKER_MAJOR_TAG}"; do
              if EXISTING_DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${TAG}" --format '{{.Manifest.Digest}}' 2>/dev/null); then
                if [[ "${EXISTING_DIGEST}" != "${RC_DIGEST}" ]]; then
                  if [[ "${FORCE}" == "true" ]]; then
                    echo "::warning::${IMAGE}:${TAG} already exists with digest ${EXISTING_DIGEST} (RC digest: ${RC_DIGEST}). Force mode enabled — will overwrite."
                    FORCE_OVERRIDE_USED=true
                  else
                    echo "::error::${IMAGE}:${TAG} already exists with digest ${EXISTING_DIGEST} but RC digest is ${RC_DIGEST}. Aborting to prevent overwrite. Use force=true to override."
                    exit 1
                  fi
                else
                  echo "${IMAGE}:${TAG} already exists at the correct digest (idempotent re-run)"
                fi
              else
                echo "${IMAGE}:${TAG} does not yet exist — safe to create"
              fi
            done
            if [[ "${FORCE_OVERRIDE_USED}" == "true" ]]; then
              echo "::warning::Overwriting one or more existing stable tags due to force=true"
            fi
            echo "Re-tagging ${IMAGE}:${DOCKER_RC_TAG} -> ${DOCKER_PATCH_TAG}, ${DOCKER_MINOR_TAG}, ${DOCKER_MAJOR_TAG}"
            docker buildx imagetools create \
              --tag "${IMAGE}:${DOCKER_PATCH_TAG}" \
              --tag "${IMAGE}:${DOCKER_MINOR_TAG}" \
              --tag "${IMAGE}:${DOCKER_MAJOR_TAG}" \
              "${IMAGE}:${DOCKER_RC_TAG}"
          done

      - name: Verify Docker image digests
        env:
          DOCKER_RC_TAG: ${{ needs.validate.outputs.docker_rc_tag }}
          DOCKER_PATCH_TAG: ${{ needs.validate.outputs.docker_patch_tag }}
          DOCKER_MINOR_TAG: ${{ needs.validate.outputs.docker_minor_tag }}
          DOCKER_MAJOR_TAG: ${{ needs.validate.outputs.docker_major_tag }}
        run: |
          set -euo pipefail
          for IMAGE in ghcr.io/open-edge-platform/anomalib-studio-${DEVICE}; do
            RC_DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${DOCKER_RC_TAG}" | awk '/^Digest:/{print $2}')
            echo "${IMAGE}:${DOCKER_RC_TAG} digest: ${RC_DIGEST}"
            for TAG in "${DOCKER_PATCH_TAG}" "${DOCKER_MINOR_TAG}" "${DOCKER_MAJOR_TAG}"; do
              RELEASE_DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${TAG}" | awk '/^Digest:/{print $2}')
              if [[ "${RC_DIGEST}" != "${RELEASE_DIGEST}" ]]; then
                echo "::error::Digest mismatch for ${IMAGE}:${TAG} (expected ${RC_DIGEST}, got ${RELEASE_DIGEST})"
                exit 1
              fi
              echo "Verified ${IMAGE}:${TAG} digest matches RC"
            done
          done

      - name: Sign Docker image
        uses: open-edge-platform/geti-ci/actions/sign-image@9b1ef60a8b2b802da428621e192c322960f4b3d5
        with:
          image-uri: ghcr.io/open-edge-platform/anomalib-studio-${{ matrix.device }}:${{ needs.validate.outputs.docker_patch_tag }}

      - name: Print summary
        env:
          RC_TAG: ${{ needs.validate.outputs.rc_tag }}
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
          RC_SHA: ${{ needs.validate.outputs.rc_sha }}
          DOCKER_PATCH_TAG: ${{ needs.validate.outputs.docker_patch_tag }}
          DOCKER_MINOR_TAG: ${{ needs.validate.outputs.docker_minor_tag }}
          DOCKER_MAJOR_TAG: ${{ needs.validate.outputs.docker_major_tag }}
        run: |
          {
            echo "## Promotion Complete"
            echo ""
            echo "### Docker Images"
            echo "- \`ghcr.io/open-edge-platform/anomalib-studio-${DEVICE}:${DOCKER_PATCH_TAG}\`"
            echo "- \`ghcr.io/open-edge-platform/anomalib-studio-${DEVICE}:${DOCKER_MINOR_TAG}\`"
            echo "- \`ghcr.io/open-edge-platform/anomalib-studio-${DEVICE}:${DOCKER_MAJOR_TAG}\`"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"
