# Production Release Process Workflow
#
# This reusable workflow manages the production release process, including
# validation, preparation, and publication steps.
#
# Key Features:
# - Environment-based approval gate
# - Production deployment
# - Artifact management
# - Release publication
#
# Process Stages:
# 1. Release Preparation:
#    - Artifact collection
#    - Production bundle creation
#    - Documentation updates
#
# 2. Publication:
#    - Production PyPI deployment
#    - GitHub release creation
#    - Documentation publishing
#
# Required Inputs:
# - version: Release version
# - artifact-name: Name of validated artifact
#
# Note: PyPI publishing uses OIDC (OpenID Connect) authentication.
# Configure trusted publisher in PyPI project settings:
# - Owner: <your-org>
# - Repository name: anomalib
# - Workflow name: release.yaml
# - Environment name: production
#
# Example Usage:
# 1. Production Release:
#    jobs:
#      release:
#        uses: ./.github/workflows/_reusable-production-release-process.yaml
#        with:
#          version: "v1.2.3"
#          artifact-name: "dist-123456789"
#        secrets:
#          pypi-token: ${{ secrets.PYPI_TOKEN }}
#
# Note: Uses `production` environment protection as the release approval gate

name: Production Release Process

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      artifact-name:
        required: true
        type: string

permissions:
  contents: read
  id-token: write # Required for OIDC authentication with PyPI

jobs:
  prepare-release:
    environment:
      name: production
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          name: ${{ inputs.artifact-name }}
          path: dist

      - name: Upload for production release
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: production-release-artifacts
          path: dist/
          retention-days: 1

  publish:
    needs: [prepare-release]
    uses: ./.github/workflows/_reusable-release-publisher.yaml
    permissions:
      contents: write # is required by action-gh-release (nested)
      id-token: write # Required for OIDC authentication with PyPI
    with:
      version: ${{ inputs.version }}
      artifact-name: production-release-artifacts
      is-prerelease: false
